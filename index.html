<!DOCTYPE html>
<html><head>
    <title>Mi Dado Virtual</title>
    <link rel="stylesheet" href="style.css">

    <link rel="manifest" href="manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/icon-192.png">
    <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script></head>
<body>
    <div class="container">
    <div class="scene">
        <div class="cube" id="cube">
            <div class="face front one"><span class="dot"></span></div>
            <div class="face back six">
                <div class="column"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                <div class="column"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>
            <div class="face right three"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            <div class="face left four">
                <div class="column"><span class="dot"></span><span class="dot"></span></div>
                <div class="column"><span class="dot"></span><span class="dot"></span></div>
            </div>
            <div class="face top two"><span class="dot"></span><span class="dot"></span></div>
            <div class="face bottom five">
                <div class="column"><span class="dot"></span><span class="dot"></span></div>
                <div class="column"><span class="dot"></span></div>
                <div class="column"><span class="dot"></span><span class="dot"></span></div>
            </div>
        </div>
    </div>
    
    <button id="roll-btn">LANZAR DADO</button>
</div>

<script src="script.js"></script>

</body></html>
